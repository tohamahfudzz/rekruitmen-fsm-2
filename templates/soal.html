<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soal Rekrutmen</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 20px auto;
            padding: 20px;
            background: #f5f5f5;
        }

        h1 {
            text-align: center;
        }

        .soal {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .pertanyaan {
            font-weight: bold;
            margin-bottom: 10px;
        }

        label {
            display: block;
            margin: 5px 0;
            cursor: pointer;
        }

        button {
            padding: 10px 20px;
            background: #007bff;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        #hasil {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1 id="judul">Loading...</h1>

    <form id="quizForm">
        <div id="containerSoal"></div>

        <button type="submit">
            Submit Jawaban
        </button>
    </form>

    <div id="hasil"></div>

    <script>

        // Variabel hasil pilihan user sebelumnya
        let jenisSoalDipilih = "Front End Developer";

        fetch("soal.json")
            .then(response => response.json())
            .then(data => {

                const kelompok = data.kelompok_soal.find(
                    item => item.nama_kelompok === jenisSoalDipilih
                );

                if (!kelompok) {
                    document.getElementById("containerSoal").innerHTML =
                        "<p>Kelompok soal tidak ditemukan.</p>";
                    return;
                }

                document.getElementById("judul").innerText =
                    kelompok.nama_kelompok;

                let html = "";

                kelompok.soal.forEach((soal, index) => {

                    html += `
                        <div class="soal">
                            <div class="pertanyaan">
                                ${index + 1}. ${soal.pertanyaan}
                            </div>

                            ${Object.entries(soal.pilihan)
                                .map(([key, value]) => `
                                    <label>
                                        <input
                                            type="radio"
                                            name="soal_${soal.id}"
                                            value="${key}">
                                        ${key}. ${value}
                                    </label>
                                `).join("")}
                        </div>
                    `;
                });

                document.getElementById("containerSoal").innerHTML = html;

                document.getElementById("quizForm")
                    .addEventListener("submit", function(e) {

                    e.preventDefault();

                    let skor = 0;

                    kelompok.soal.forEach(soal => {

                        const jawaban = document.querySelector(
                            `input[name="soal_${soal.id}"]:checked`
                        );

                        if (jawaban &&
                            jawaban.value === soal.jawaban) {
                            skor++;
                        }
                    });

                    document.getElementById("hasil").innerHTML =
                        `Skor Anda: ${skor} / ${kelompok.soal.length}`;
                });

            })
            .catch(error => {
                console.error(error);

                document.getElementById("containerSoal").innerHTML =
                    "<p>Gagal memuat file JSON.</p>";
            });

    </script>

</body>
</html>
